services:
  app:
    build: .
    container_name: proyecto_efsrt_app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: db_gestion_servicios
      DB_USER: root
      DB_PASSWORD: root123
      PUBLIC_BASE_URL: http://localhost:8080
      APP_INTERNAL_URL: http://app:8080
      N8N_WHATSAPP_WEBHOOK_URL: http://n8n:5678/webhook/proyecto-efsrt-whatsapp
      N8N_WHATSAPP_TOKEN: REEMPLAZAR_TOKEN_N8N
      SMTP_HOST: ""
      SMTP_PORT: ""
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      SMTP_FROM: ""
    depends_on:
      - db
      - n8n

  db:
    image: mysql:8.0
    container_name: proyecto_efsrt_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: db_gestion_servicios
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./clientes.sql:/docker-entrypoint-initdb.d/clientes.sql

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: proyecto_efsrt_n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678
      GENERIC_TIMEZONE: America/Lima
      TZ: America/Lima
      N8N_SECURE_COOKIE: "false"
      EVOLUTION_API_URL: http://evolution:8080
      EVOLUTION_INSTANCE_NAME: principal
      EVOLUTION_API_KEY: REEMPLAZAR_API_KEY_EVOLUTION
      N8N_WHATSAPP_TOKEN: REEMPLAZAR_TOKEN_N8N
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n:/files
    depends_on:
      - evolution

  evolution:
    image: evoapicloud/evolution-api:latest
    container_name: proyecto_efsrt_evolution
    restart: always
    ports:
      - "8081:8080"
    environment:
      SERVER_TYPE: http
      SERVER_PORT: 8080
      SERVER_URL: http://localhost:8081
      AUTHENTICATION_API_KEY: REEMPLAZAR_API_KEY_EVOLUTION
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution123@evolution-postgres:5432/evolution?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: proyecto_efsrt
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://evolution-redis:6379/6
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: "true"
      CACHE_LOCAL_ENABLED: "false"
    depends_on:
      - evolution-postgres
      - evolution-redis

  evolution-postgres:
    image: postgres:16
    container_name: proyecto_efsrt_evolution_postgres
    restart: always
    environment:
      POSTGRES_DB: evolution
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution123
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data

  evolution-redis:
    image: redis:7-alpine
    container_name: proyecto_efsrt_evolution_redis
    restart: always
    volumes:
      - evolution_redis_data:/data

volumes:
  mysql_data:
  n8n_data:
  evolution_postgres_data:
  evolution_redis_data:
